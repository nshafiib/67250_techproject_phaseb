<body onload="addYear()">
  <div class="container">
    <header class="header">
      <img id="logo" src="../static/monomuselogo.png" alt="MonoMuse Museum Logo"> 
      <h1>Checkout</h1>
    </header>
    <nav class="nav_bar">
        <a href="../index.html">Home</a>
        <a href="explore.html">Explore</a>
        <a href="exhibitions.html">Exhibitions</a>
        <a href="buytickets.html">Tickets</a>
        <a href="checkout.html">Checkout</a>
    </nav>
    <main class="main">
      <form action="checkout.html" method="get">
        <label for="name">Name: (required)</label><br>
        <input type="text" id="name" name="name" required><br><br>
        <label for="email">Email: (required)</label><br>
        <input type="email" id="email" name="email" required><br><br>
        <label for="tickets">Ticket Quantity: (required)</label><br>
        <input type="number" id="tickets" name="tickets" required><br><br>
        <button type="submit">Submit</button>
      </form>
    </main>
    <figure class="main_figure"></figure>
    <footer class="footer">
      <p>&copy; MonoMuse. All rights reserved.</p>
      <p id="copyYear"></p>
    </footer>
  </div>
